<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members</title>
</head>
<body>
    <table>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Subteam</th>
            <th>Status</th>
        </tr>

        {% for member in members %}
        <tr>
            <td>{{ member.username }}</td>
            <td>{{ member.email }}</td>
            <td>{{ member.subteam }}</td>
            <td>{{ member.status }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
