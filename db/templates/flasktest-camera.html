<!DOCTYPE html>
<html>
<head>
    <title>Camera</title>
    <link rel="stylesheet" href="/static/flasktest-camStyle.css">
    <link rel="stylesheet" href="/static/flasktest-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!--Credit:https://www.npmjs.com/package/html5-qrcode/v/2.3.8?activeTab=code-->
    <!--Credit: https://www.youtube.com/watch?v=19eo39lqpLM-->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">Blue Cheese Robotics</div>
            <ul class="nav-menu">
                <li><a href="/home" class="nav-link">Home</a></li>
                <li><a href="/information" class="nav-link">Information</a></li>
                <li><a href="/camera" class="nav-link active">Camera</a></li>
                <li><a href="/admin" class="nav-link">Admin Panel</a></li>
            </ul>
            <a href="/profile" id="nav-profile" class="nav-link nav-logout">Profile</a>
            <a href="/" id="nav-signin" class="nav-link nav-logout">Sign In</a>
        </div>
    </nav>
    <div id="reader"></div>
    <div id="result"></div>

    <script>
        const scanner = new Html5QrcodeScanner('reader', {
        qrbox: {
            width: 250,
            height: 250,
        },
        fps: 20,
    });

        scanner.render(success, error);

        function success(result) {
            document.getElementById('result').innerHTML = `
                <h2>Success!</h2>
                <p><a href="${result}">${result}</a></p>
            `;
            scanner.clear();
            document.getElementById('reader').remove();
        }

        function error(err) {
            console.error(err);
        }
    </script>
    <script src="/static/flasktest-nav.js"></script>
</body>
</html>
