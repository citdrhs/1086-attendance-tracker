<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Account Profile</title>
    <link rel="stylesheet" href="student-profile/flasktest-profile.css">
</head>

<body>

    <div class="profile-card">

    <h2>Account Profile</h2>

    <div class="profile-field">
        <label>Username</label>
        <span id="usernameText">aditi123</span>
        <input id="usernameInput" type="text" value="aditi123" style="display:none">
    </div>

    <div class="profile-field">
        <label>Email</label>
        <span id="emailText">aditi@email.com</span>
        <input id="emailInput" type="text" value="aditi@email.com" style="display:none">
    </div>

    <div class="profile-field">
        <label>Password</label>
        <span id="passwordText">••••••••</span>
        <input id="passwordInput" type="password" style="display:none">
    </div>

    <div class="profile-field">
        <label>Status</label>
        <span id="statusText">Rookie</span>
        <select id="statusInput" style="display:none">
        <option>Rookie</option>
        <option>Veteran</option>
        </select>
    </div>

    <div class="profile-field">
    <label>Subteam</label>
    <span id="subteamText">Fabrication</span>
    <select id="subteamInput" style="display:none">
    <option>Fabrication</option>
    <option>CAD</option>
    <option>Media</option>
    <option>Impact</option>
    <option>Strategy</option>
    <option>Business</option>
    </select>
    </div>

    <p id="backBtn" class="small">
        <a href="index.html">Back to home</a>
    </p>

    </div>

    <script src="student-profile/flasktest-profile.js"></script>

</body>
</html>
