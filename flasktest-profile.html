<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Account Profile</title>
    <link rel="stylesheet" href="student-profile/flasktest-profile.css">
</head>

<body>

    <div class="profile-card">

    <h2>Account Profile</h2>

    <div class="profile-field">
        <label>Username</label>
        <span id="usernameText">avani123</span>
        <input id="usernameInput" type="text" value="avani123" hidden>
        <button onclick="editField('username')">Edit</button>
    </div>

    <div class="profile-field">
        <label>Email</label>
        <span id="emailText">avani@email.com</span>
        <input id="emailInput" type="text" value="avani@email.com" hidden>
        <button onclick="editField('email')">Edit</button>
    </div>

    <div class="profile-field">
        <label>Phone Number</label>
        <span id="phoneText">804-555-1234</span>
        <input id="phoneInput" type="text" value="804-555-1234" hidden>
        <button onclick="editField('phone')">Edit</button>
    </div>

    <div class="profile-field">
        <label>Discord ID</label>
        <span id="discordText">avani#2341</span>
        <input id="discordInput" type="text" value="avani#2341" hidden>
        <button onclick="editField('discord')">Edit</button>
    </div>

    <div class="profile-field">
        <label>Status</label>
        <span id="statusText">Rookie</span>
        <select id="statusInput" hidden>
        <option>Rookie</option>
        <option>Veteran</option>
        </select>
        <button onclick="editField('status')">Edit</button>
    </div>

    <div class="profile-field">
    <label>Subteam</label>
    <span id="subteamText">Fabrication</span>
    <select id="subteamInput" hidden>
    <option>Fabrication</option>
    <option>CAD</option>
    <option>Media</option>
    <option>Impact</option>
    <option>Strategy</option>
    <option>Business</option>
    </select>
    <button onclick="editField('subteam')">Edit</button>
    </div>

    </div>

    <script src="student-profile/flasktest-profile.js"></script>

</body>
</html>
